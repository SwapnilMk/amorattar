name: Deploy Amorattar to EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate .env file from GitHub Secrets
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Create tar archive of tracked files
        run: |
          mkdir -p .deployment
          tar -czf .deployment/app.tar.gz --exclude='.git' --exclude='node_modules' --exclude='.next' --exclude='.deployment' .

      - name: Copy archive to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: '.deployment/app.tar.gz'
          target: '/home/ubuntu/deploy-amorattar'
          command_timeout: 30m

      - name: Extract, Build and Deploy Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            # 1. Setup application directory
            mkdir -p /home/ubuntu/amorattar

            # 2. Extract contents
            tar -xzf /home/ubuntu/deploy-amorattar/.deployment/app.tar.gz -C /home/ubuntu/amorattar

            # 3. Clean up the deploy directory
            rm -rf /home/ubuntu/deploy-amorattar

            # 4. Run Docker Compose
            cd /home/ubuntu/amorattar

            # Use appropriate docker compose command depending on version installed
            if docker compose version > /dev/null 2>&1; then
              docker compose down || true
              docker system prune -f || true
              docker compose up -d --build
            elif command -v docker-compose &> /dev/null; then
              docker-compose down || true
              docker system prune -f || true
              docker-compose up -d --build
            else
              echo "Docker Compose is not installed on this EC2 instance. Please install Docker and Docker Engine."
              exit 1
            fi
